<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphling 3D — Enterprise Architecture</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: #888;
    }

    .prose h1,
    .prose h2,
    .prose h3 {
      color: #fff;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-top: 2.5rem;
    }

    .prose h1 {
      font-size: 2.5rem;
      border-bottom: 1px solid #171717;
      padding-bottom: 1rem;
    }

    .prose p {
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .prose :not(pre)>code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(120, 120, 120, 0.05);
      color: #bbb;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .prose pre {
      position: relative;
      background: #0a0a0a !important;
      border: 1px solid #171717;
      border-radius: 9px;
      padding: 4rem 1.5rem 1.5rem 1.1rem !important;
      font-size: 0.75rem;
      margin: 2rem 0;
      overflow-x: auto;
      box-shadow: 0 10px 40px 0 #000a, 0 1.5px 0px 0 #3332;
    }

    /* Mac window controls */
    .code-header {
      position: absolute;
      top: 0.7rem;
      left: 1.2rem;
      display: flex;
      gap: 0.4rem;
      z-index: 1;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.red {
      background: #ef4444;
      box-shadow: 0 0 2px #ef44446a;
    }

    .dot.yellow {
      background: #facc15;
      box-shadow: 0 0 2px #facc156a;
    }

    .dot.green {
      background: #22c55e;
      box-shadow: 0 0 2px #22c55e6a;
    }

    /* Copy Button */
    .copy-btn {
      position: absolute;
      top: 0.6rem;
      right: 1.3rem;
      background: #222;
      color: #fff;
      font-size: 0.8rem;
      padding: 0.2rem 0.8rem;
      border-radius: 5px;
      border: none;
      opacity: 0.5;
      transition: opacity 0.15s;
      cursor: pointer;
      z-index: 2;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .copy-btn:hover {
      opacity: 0.9;
      background: #055641;
      color: #e8ffe8;
    }

    .copy-btn.copied {
      background: #059669;
      color: #fff;
      opacity: 1;
    }

    .prose a {
      color: #10b981;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
    }

    .prose a:hover {
      border-bottom-color: #10b981;
    }

    .prose ul {
      list-style: disc;
      padding-left: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .prose ul li {
      padding: 0.5rem 0;
    }

    /* Sidebar Active State */
    .nav-active {
      color: #fff !important;
      border-left: 1px solid #10b981 !important;
      background: linear-gradient(to right, rgba(16, 185, 129, 0.05), transparent);
    }

    /* Table Style */
    .prose table {
      width: 100%;
      margin: 2rem 0;
      border-collapse: collapse;
      font-size: 0.9rem;
      text-align: left;
      border: 1px solid #171717;
      border-radius: 8px;
      overflow: hidden;
    }

    .prose thead {
      background: rgba(16, 185, 129, 0.05);
      border-bottom: 1px solid #171717;
    }

    .prose th {
      color: #fff !important;
      font-weight: 600 !important;
      padding: 1rem !important;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.75rem;
    }

    .prose td {
      padding: 1rem !important;
      border-bottom: 1px solid #171717;
      color: #888;
      vertical-align: top;
      white-space: nowrap;
    }

    .prose tr:last-child td {
      border-bottom: none;
    }

    .prose tr:hover td {
      background: rgba(255, 255, 255, 0.01);
      color: #ccc;
    }

    /* Responsivitas Tabel */
    #content {
      overflow-x: auto;
    }
  </style>
</head>

<body class="antialiased selection:bg-emerald-500/30">

  <div class="fixed top-0 z-[100] h-[1px] w-full bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent">
  </div>

  <header class="fixed top-0 z-50 w-full border-b border-neutral-900 bg-[#050505]/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5">
      <div class="flex items-center gap-3">
        <img src="assets/logo.png" alt="Morphling 3D Logo" class="h-6 w-6 object-contain" />
        <span class="text-[11px] font-bold uppercase tracking-[0.4em] text-white">Morphling 3D</span>
      </div>
      <div class="flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest text-neutral-500">
        <a href="https://github.com/morphling-dev/3d" class="hover:text-white transition">GitHub</a>
        <span
          class="rounded-full border border-emerald-500/20 px-3 py-1 text-emerald-500 bg-emerald-500/5">v1.0.0-dev</span>
      </div>
    </div>
  </header>

  <div class="mx-auto flex max-w-7xl px-6 pt-32">
    <aside class="fixed h-[calc(100vh-120px)] w-64 overflow-y-auto pr-8 custom-scrollbar hidden lg:block">
      <nav id="sidebar-nav" class="flex flex-col gap-8">
      </nav>
    </aside>

    <main class="lg:ml-72 w-full pb-32">
      <article id="content" class="prose prose-invert max-w-3xl">
        <div class="flex items-center gap-2 text-emerald-500 mb-8">
          <span class="h-1 w-1 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Loading Documentation...</span>
        </div>
      </article>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup-templating.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script>
    // Normalize path to always lowercase for filesystem-insensitive match (GitHub Pages is case sensitive)
    function normalizePath(path) {
      return path.replace(/\\/g, '/');
    }

    // Sidebar structure. Use README.md (uppercase!) and real filenames!
    const navigation = [
      { label: 'Introduction', path: 'README.md' },
      { label: 'Installation', path: 'installation.md' },
      {
        label: 'Architecture',
        items: [
          { label: 'Overview', path: 'architecture/overview.md' },
          { label: 'Domain Layer', path: 'architecture/domain.md' },
          { label: 'Application Layer', path: 'architecture/application.md' },
          { label: 'Infrastructure Layer', path: 'architecture/infrastructure.md' },
          { label: 'Delivery Layer', path: 'architecture/delivery.md' },
        ]
      },
      {
        label: 'Commands',
        items: [
          { label: 'Generators', path: 'commands/generators.md' },
          { label: 'Management', path: 'commands/management.md' },
        ]
      },
      {
        label: 'Features',
        items: [
          { label: 'Auto Discovery', path: 'features/auto-discovery.md' },
          { label: 'Deep Linking', path: 'features/deep-linking.md' }
        ]
      }
    ];

    // Prism language detector (best effort)
    function getCodeLang(pre) {
      const code = pre.querySelector('code');
      if (code) {
        const langClass = Array.from(code.classList).find(cls => cls.startsWith('language-'));
        return langClass ? langClass.replace('language-', '') : '';
      }
      return '';
    }

    // Add code header and copy button to all code blocks
    function enhanceCodeBlocks() {
      document.querySelectorAll('pre').forEach(pre => {
        // Avoid duplicate headers if re-rendered
        if (pre.querySelector('.copy-btn')) return;

        // Mac window controls
        const codeHeader = document.createElement('div');
        codeHeader.className = 'code-header';
        codeHeader.innerHTML = `
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        `;

        // Copy button
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.type = 'button';
        copyBtn.innerText = 'Copy';

        copyBtn.addEventListener('click', async function (e) {
          e.preventDefault();
          const codeEl = pre.querySelector('code');
          if (!codeEl) return;
          const codeText = codeEl.innerText;
          try {
            await navigator.clipboard.writeText(codeText);
            copyBtn.innerText = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.innerText = 'Copy';
              copyBtn.classList.remove('copied');
            }, 1300);
          } catch (err) {
            copyBtn.innerText = 'Error';
            setTimeout(() => copyBtn.innerText = 'Copy', 1200);
          }
        });

        pre.insertBefore(codeHeader, pre.firstChild);
        pre.appendChild(copyBtn);
      });
    }

    // Wraps tables within overflow-x auto if not already wrapped
    function wrapTables() {
      const contentDiv = document.getElementById('content');
      if (!contentDiv) return;

      // Find all direct tables that are NOT already wrapped
      contentDiv.querySelectorAll('table').forEach(table => {
        // Check if direct parent is already overflow-x wrapper
        const parent = table.parentElement;
        if (
          parent &&
          parent.nodeName === "DIV" &&
          (
            parent.style.overflowX === "auto" ||
            parent.classList.contains('table-overflow-x')
          )
        ) {
          return;
        }

        // Only wrap if NOT already wrapped
        const wrapper = document.createElement('div');
        wrapper.className = 'table-overflow-x';
        wrapper.style.overflowX = 'auto';
        wrapper.style.width = '100%';
        parent.replaceChild(wrapper, table);
        wrapper.appendChild(table);
      });
    }

    // Fetches and renders a markdown file by path. Updates location hash for navigation/bookmarking.
    async function loadMarkdown(path, pushHash = true) {
      const contentDiv = document.getElementById('content');
      const normalized = normalizePath(path);
      const indexDir = window.location.pathname.replace(/\/index\.html$/, '/') || './';

      contentDiv.innerHTML = `<div class="animate-pulse text-emerald-500/50 text-[10px] uppercase tracking-widest">Fetching ${normalized}...</div>`;
      try {
        const candidates = [
          normalized,
          `docs/${normalized}`,
          `${indexDir}${normalized}`,
        ];
        let response = null;
        for (const url of candidates) {
          response = await fetch(url);
          if (response.ok) break;
        }
        if (!response || !response.ok) {
          throw new Error('File not found');
        }

        const text = await response.text();
        contentDiv.innerHTML = marked.parse(text);

        // Highlight with Prism and decorate code blocks
        try {
          if (window.Prism && typeof Prism.highlightAll === 'function') {
            Prism.highlightAll();
          }
        } catch (e) {
          console.warn('Prism highlight failed:', e);
        }
        enhanceCodeBlocks();

        // Wrap tables in overflow-x auto container
        wrapTables();

        updateActiveLink(normalized);

        if (pushHash) {
          window.location.hash = encodeURIComponent(normalized);
        }
        window.scrollTo(0, 0);
      } catch (err) {
        console.log(err)
        contentDiv.innerHTML = `
            <div class="py-20">
                <h1 class="text-6xl font-light text-white mb-4">404</h1>
                <p class="text-neutral-500 mb-8">File <code class="text-emerald-500">${normalized}</code> not found.</p>
                <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-xs text-red-400">
                    Ensure <b>${normalized}</b> exists in the <b>docs/</b> folder
                </div>
            </div>`;
      }
    }

    // Generate sidebar navigation from definition above.
    function renderSidebar() {
      const nav = document.getElementById('sidebar-nav');
      let html = '';

      navigation.forEach(section => {
        if (section.items) {
          html += `<div class="flex flex-col gap-3">
                      <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-neutral-600">${section.label}</span>
                      <div class="flex flex-col border-l border-neutral-900 ml-1">
                        ${section.items.map(item => `
                          <a href="#${encodeURIComponent(item.path)}" data-path="${item.path}" 
                            class="py-2 pl-4 text-sm transition hover:text-emerald-500 border-l border-transparent -ml-[1px]">
                            ${item.label}
                          </a>
                        `).join('')}
                      </div>
                  </div>`;
        } else {
          html += `<a href="#${encodeURIComponent(section.path)}" data-path="${section.path}" 
                    class="text-sm font-medium transition hover:text-emerald-500 border-l border-transparent pl-4 -ml-[1px]">
                    ${section.label}
                  </a>`;
        }
      });
      nav.innerHTML = html;

      nav.querySelectorAll('a[data-path]').forEach(a => {
        a.addEventListener('click', function (e) {
          e.preventDefault();
          const path = this.getAttribute('data-path');
          loadMarkdown(path);
        });
      });
    }

    // Highlight the active link in the sidebar.
    function updateActiveLink(path) {
      document.querySelectorAll('#sidebar-nav a[data-path]').forEach(a => {
        if (normalizePath(a.getAttribute('data-path')) === normalizePath(path)) {
          a.classList.add('nav-active');
        } else {
          a.classList.remove('nav-active');
        }
      });
    }

    // Determine which .md file to open based on hash fragment, fallback to README.md.
    function currentMarkdownFromHash() {
      let hash = decodeURIComponent(window.location.hash.replace(/^#/, ''));

      hash = hash.replace(/^\/+/, '');
      if (hash && !hash.endsWith('.md')) {
        hash = `${hash}.md`;
      }

      const allPaths = [];
      function collectPaths(items) {
        for (const i of items) {
          if (i.items) collectPaths(i.items); else allPaths.push(normalizePath(i.path));
        }
      }
      collectPaths(navigation);
      if (allPaths.includes(normalizePath(hash))) {
        return hash;
      }
      return "README.md";
    }

    // Setup hashchange listener for browser navigation and direct linking.
    window.addEventListener("hashchange", () => {
      const md = currentMarkdownFromHash();
      loadMarkdown(md, false);
    });

    // Initial load of sidebar and markdown.
    window.addEventListener('DOMContentLoaded', () => {
      renderSidebar();
      loadMarkdown(currentMarkdownFromHash(), false);
    });
  </script>
</body>

</html>
