<!DOCTYPE html>
<html lang="en" x-data x-init="$store.sidebarOpen = false" x-cloak>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphling 3D — Enterprise Architecture</title>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Prism -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/style.css">
  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Alpine Js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="antialiased selection:bg-emerald-500/30 bg-[#050505] text-neutral-400">

  <!-- Top Gradient -->
  <div class="fixed top-0 z-[100] h-[1px] w-full bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent">
  </div>

  <!-- Header (Mobile/desktop) -->
  <header class="fixed top-0 z-50 w-full border-b border-neutral-900 bg-[#050505]/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 sm:px-6 py-5">
      <div class="flex items-center gap-3">
        <img src="assets/logo.png" alt="Morphling 3D Logo" class="h-6 w-6 object-contain" loading="lazy" />
        <span class="text-[11px] font-bold uppercase tracking-[0.4em] text-white">Morphling 3D</span>
      </div>
      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest text-neutral-500">
        <a href="https://github.com/morphling-dev/3d" class="hover:text-white transition">GitHub</a>
        <span
          class="rounded-full border border-emerald-500/20 px-3 py-1 text-emerald-500 bg-emerald-500/5">v1.0.0-dev</span>
      </div>
      <!-- Mobile: Sidebar Toggle Button -->
      <button @click="$store.sidebarOpen = true"
        class="md:hidden flex items-center justify-center rounded px-2 py-1 text-neutral-400 hover:text-emerald-500 transition focus:outline-none"
        aria-label="Open Menu" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </header>

  <div class="mx-auto flex max-w-7xl px-4 sm:px-6 pt-28 sm:pt-32">

    <!-- Sidebar Desktop -->
    <aside class="hidden lg:block fixed h-[calc(100vh-120px)] w-64 overflow-y-auto pr-8 custom-scrollbar">
      <nav id="sidebar-nav" class="flex flex-col gap-4"></nav>
    </aside>

    <!-- Sidebar Mobile Overlay and Drawer -->
    <div x-show="$store.sidebarOpen" x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0" class="fixed inset-0 z-[160] flex lg:hidden" style="display: none;">
      <!-- Overlay -->
      <div class="fixed inset-0 bg-black/60" @click="$store.sidebarOpen = false" aria-hidden="true"></div>
      <!-- Mobile Sidebar Drawer -->
      <div
        class="relative h-full w-72 max-w-full bg-[#111] border-r border-neutral-800 transition-transform duration-200 ease-in-out flex flex-col px-5 pt-7 overflow-y-auto custom-scrollbar z-[200]"
        x-transition:enter="transition-transform duration-200" x-transition:enter-start="-translate-x-full"
        x-transition:enter-end="translate-x-0" x-transition:leave="transition-transform duration-150"
        x-transition:leave-start="translate-x-0" x-transition:leave-end="-translate-x-full"
        @keydown.escape.window="$store.sidebarOpen = false">
        <div class="flex items-center justify-between mb-5">
          <div class="flex items-center gap-2">
            <img src="assets/logo.png" alt="Logo" class="w-6 h-6 object-contain" />
            <span class="text-xs font-bold uppercase tracking-widest text-white">Morphling 3D</span>
          </div>
          <button
            class="rounded hover:bg-neutral-900 p-1 text-neutral-400 hover:text-emerald-500 transition focus:outline-none"
            @click="$store.sidebarOpen = false" aria-label="Close Menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <nav id="sidebar-nav-mobile" class="flex flex-col gap-4"></nav>
        <div class="pt-8 text-xs text-neutral-600">
          <a href="https://github.com/morphling-dev/3d" class="hover:text-emerald-500 transition">GitHub</a>
          <span
            class="ml-2 rounded border border-emerald-500/20 px-2 py-0.5 text-emerald-500 bg-emerald-500/5">v1.0.0-dev</span>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="w-full lg:ml-72 pb-32">
      <article id="content" class="prose prose-invert max-w-3xl">
        <div class="flex items-center gap-2 text-emerald-500 mb-8">
          <span class="h-1 w-1 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Loading Documentation...</span>
        </div>
      </article>
    </main>
  </div>

  <!-- PrismJS & MarkedJS (lightweight), then custom app js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup-templating.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <!-- Custom JS -->
  <script type="module" src="assets/app.js"></script>
</body>

</html>
